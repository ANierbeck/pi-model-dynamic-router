name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag to publish (e.g. v1.1.0) — must match version in package.json'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate ref is a git tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ github.event.inputs.ref }}
        run: |
          if ! git tag -l "$TAG" | grep -q .; then
            echo "Error: '$TAG' is not a git tag"
            exit 1
          fi
          git checkout "$TAG"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:coverage

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Switch to release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ github.event.inputs.ref }}
        run: git checkout "$TAG"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@anierbeck'

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --provenance --access public
