name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag to publish (e.g. v1.1.0) — must match version in package.json'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout default ref first (fetch-depth: 0 pulls all tags).
      # For workflow_dispatch the validation step below switches to the
      # validated tag before any build or test code runs.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate ref is a git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git tag -l "${{ github.event.inputs.ref }}" | grep -q .; then
            echo "Error: '${{ github.event.inputs.ref }}' is not a git tag"
            exit 1
          fi
          git checkout "${{ github.event.inputs.ref }}"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:coverage

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@anierbeck'

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
